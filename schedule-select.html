<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>면접 일정 선택 | 엘앤티렉서스(주)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./emailjs.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:#F5F4F0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;border-radius:16px;padding:40px;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.1)}
  .logo{font-size:13px;font-weight:600;color:#534AB7;margin-bottom:24px}
  h1{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
  .sub{font-size:14px;color:#666;margin-bottom:28px;line-height:1.6}
  .slot{border:2px solid #E8E7E2;border-radius:12px;padding:16px 20px;margin-bottom:12px;cursor:pointer;transition:all .2s}
  .slot:hover{border-color:#534AB7;background:#FAFAFE}
  .slot.selected{border-color:#534AB7;background:#EEEDFE}
  .slot-date{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
  .slot-time{font-size:15px;color:#534AB7;font-weight:600}
  .slot-location{font-size:13px;color:#666;margin-top:4px}
  .slot-check{display:none;color:#534AB7;font-size:18px;margin-left:auto}
  .slot.selected .slot-check{display:block}
  .slot-inner{display:flex;align-items:center;gap:12px}
  .btn{width:100%;padding:16px;border-radius:10px;font-size:15px;font-weight:600;border:none;cursor:pointer;margin-top:8px;transition:all .2s}
  .btn-primary{background:#534AB7;color:#fff}
  .btn-primary:hover{background:#4239A3}
  .btn-primary:disabled{background:#C4C2E0;cursor:not-allowed}
  .msg{text-align:center;padding:40px 0;color:#666;font-size:14px;line-height:1.8}
  .success{text-align:center;padding:20px 0}
  .success-icon{font-size:48px;margin-bottom:16px}
  .success-title{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
  .success-sub{font-size:14px;color:#666;line-height:1.6}
  .divider{height:1px;background:#E8E7E2;margin:24px 0}
</style>
</head>
<body>
<div class="card" id="app">
  <div class="loading" style="text-align:center;padding:60px 0;color:#666">
    <div style="font-size:32px;margin-bottom:12px">📅</div>
    <div>면접 일정을 불러오는 중...</div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://hslykriyfmnhbwzcocjs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHlrcml5Zm1uaGJ3emNvY2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODIzMDQsImV4cCI6MjA5MzU1ODMwNH0.Ez5r-NSkQDvUmYjowHjMHeP_5BeqPxg59DxTrcKgKss';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const token = new URLSearchParams(location.search).get('token');
let selectedSlotId = null;
let selectionId = null;

const days = ['일','월','화','수','목','금','토'];
function formatDate(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일 (${days[dt.getDay()]})`;
}
function formatTime(t) {
  const [h,m] = t.split(':');
  const hour = parseInt(h);
  return `${hour < 12 ? '오전' : '오후'} ${hour <= 12 ? hour : hour-12}:${m}`;
}

const EDGE_FN_BASE = `${SUPABASE_URL}/functions/v1/`;

async function callEdgeFunction(name, body) {
  const res = await fetch(EDGE_FN_BASE + name, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'apikey': SUPABASE_KEY
    },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data };
}

const EXPIRE_HOURS = 2; // 선택 제한 시간 (서버에서도 동일하게 재검증함)

async function init() {
  if (!token) { showError('유효하지 않은 링크입니다'); return; }

  const { ok, data } = await callEdgeFunction('get-interview-slots', { token });

  if (!ok || data.error) {
    showError(data.message || data.error || '유효하지 않은 링크이거나 만료되었습니다');
    return;
  }

  // 이미 선택 완료
  if (data.status === 'already_selected') {
    showAlreadySelected(data.name, data.slot);
    return;
  }

  // 만료까지 남은 시간 표시용 타이머 세팅
  window._expiresAt = new Date(data.expiresAt);
  window._currentToken = token;

  showSlots(data.name, data.round, data.slots);
}

function showSlots(name, round, slots) {
  // 면접 라운드에 따라 안내 문구 분기
  const roundText = round === 2
    ? { title: '🎉 1차 면접 합격을 축하드립니다!', sub: `${name}님, 1차 면접에 합격하셨습니다.<br>아래 2차 면접 후보 일정 중 참석 가능한 시간을 <strong>선택</strong>해 주세요.` }
    : { title: '🎉 서류전형 합격을 축하드립니다!', sub: `${name}님, 서류전형에 합격하셨습니다.<br>아래 면접 후보 일정 중 참석 가능한 시간을 <strong>선택</strong>해 주세요.` };

  // 남은 시간 카운트다운
  const startTimer = () => {
    const el = document.getElementById('timerBadge');
    if (!el || !window._expiresAt) return;
    const diff = Math.max(0, window._expiresAt - new Date());
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    el.textContent = `⏱ 선택 가능 시간: ${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (diff <= 0) { el.textContent = '⏱ 시간 만료'; el.style.background = '#FCEBEB'; el.style.color = '#A32D2D'; document.getElementById('confirmBtn').disabled = true; }
    else setTimeout(startTimer, 1000);
  };

  document.getElementById('app').innerHTML = `
    <div class="logo">엘앤티렉서스(주) 채용</div>
    <h1>${roundText.title}</h1>
    <div class="sub">${roundText.sub}</div>
    <div id="timerBadge" style="background:#FEF3E2;color:#7A3D00;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;text-align:center;margin-bottom:16px">⏱ 로딩 중...</div>
    <div id="slotList">
      ${slots.map(s => `
        <div class="slot" id="slot-${s.id}" onclick="selectSlot('${s.id}')">
          <div class="slot-inner">
            <div style="flex:1">
              <div class="slot-date">${formatDate(s.slot_date)}</div>
              <div class="slot-time">${formatTime(s.slot_time)}${s.slot_time_end ? ' ~ ' + formatTime(s.slot_time_end) : ''}</div>
              ${s.slot_location ? `<div class="slot-location">📍 ${s.slot_location}</div>` : ''}
            </div>
            <span class="slot-check">✓</span>
          </div>
        </div>`).join('')}
    </div>
    <div class="divider"></div>
    <button class="btn btn-primary" id="confirmBtn" onclick="confirmSelection()" disabled>선택 완료</button>
    <div style="font-size:12px;color:#999;text-align:center;margin-top:12px">선택 후 변경이 어렵습니다. 신중하게 선택해 주세요.</div>
    <div style="margin-top:20px;padding:14px;background:#F5F4F0;border-radius:10px;text-align:center">
      <div style="font-size:12px;color:#666;font-weight:600">엘앤티렉서스(주) 채용담당자</div>
      <div style="font-size:14px;color:#1a1a1a;font-weight:700;margin-top:4px">📞 02-2188-3565</div>
      <div style="font-size:11px;color:#999;margin-top:4px">문의사항이 있으시면 연락해 주세요</div>
    </div>
  `;
  setTimeout(startTimer, 100);
}

function selectSlot(id) {
  document.querySelectorAll('.slot').forEach(el => el.classList.remove('selected'));
  document.getElementById('slot-'+id).classList.add('selected');
  selectedSlotId = id;
  document.getElementById('confirmBtn').disabled = false;
}


const EMAILJS_PUBLIC_KEY = '64df6f1LLxOFIWkIQ';
const EMAILJS_SERVICE_ID = 'service_lntlexusrecruit';
const EMAILJS_TEMPLATE_INTERVIEW = 'template_ju4wzpu';
if (window.emailjs) emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

async function sendInterviewerEmails(recipients, applicantName, jobTitle, round, dateStr, timeStr) {
  try {
    for (const r of (recipients || [])) {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_INTERVIEW, {
        email: r.email, to_name: r.name || '담당자',
        applicant_name: applicantName, job_title: jobTitle || '',
        interview_round: round, interview_date: dateStr, interview_time: timeStr
      });
    }
  } catch(e) { console.log('알림 발송 실패:', e); }
}

async function confirmSelection() {
  if (!selectedSlotId) return;
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true; btn.textContent = '처리 중...';

  const { ok, data } = await callEdgeFunction('confirm-interview-slot', { token, slotId: selectedSlotId });

  if (!ok || data.error) {
    btn.disabled = false; btn.textContent = '선택 완료';
    alert(data.error || '오류가 발생했습니다. 다시 시도해주세요.');
    return;
  }

  const slot = document.querySelector('.slot.selected');
  const dateText = slot.querySelector('.slot-date').textContent;
  const timeText = slot.querySelector('.slot-time').textContent;
  showSuccess(dateText, timeText);

  // 면접관들에게 확정 알림 발송 (수신자 목록은 서버에서 이미 검증/계산되어 내려옴)
  sendInterviewerEmails(data.recipients, data.applicantName, data.jobTitle, data.round, dateText, timeText);
}

function showSuccess(date, time) {
  document.getElementById('app').innerHTML = `
    <div class="logo">엘앤티렉서스(주) 채용</div>
    <div class="success">
      <div class="success-icon">🎉</div>
      <div class="success-title">면접 일정이 확정되었습니다</div>
      <div class="success-sub">
        선택하신 일정으로 면접이 진행됩니다.<br>
        <strong>${date}</strong><br>
        <strong>${time}</strong><br><br>
        추가 안내는 이메일로 발송드립니다.<br><br>
        <div style="margin-top:12px;padding:12px;background:#F5F4F0;border-radius:10px">
          <div style="font-size:12px;font-weight:600">엘앤티렉서스(주) 채용담당자</div>
          <div style="font-size:14px;font-weight:700;margin-top:4px">📞 02-2188-3565</div>
        </div>
      </div>
    </div>
  `;
}

function showAlreadySelected(name, slot) {
  document.getElementById('app').innerHTML = `
    <div class="logo">엘앤티렉서스(주) 채용</div>
    <div class="success">
      <div class="success-icon">✅</div>
      <div class="success-title">이미 일정을 선택하셨습니다</div>
      <div class="success-sub">
        선택하신 면접 일정입니다.<br><br>
        <strong>${slot ? formatDate(slot.slot_date) : '-'}</strong><br>
        <strong>${slot ? formatTime(slot.slot_time) : '-'}</strong><br>
        ${slot?.slot_location ? `📍 ${slot.slot_location}` : ''}
      </div>
    </div>
  `;
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="logo">엘앤티렉서스(주) 채용</div>
    <div class="msg">
      <div style="font-size:32px;margin-bottom:12px">❌</div>
      ${msg.replace(/\n/g,'<br>')}
    </div>
  `;
}

init();
</script>
</body>
</html>
