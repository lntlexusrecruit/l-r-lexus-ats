<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L&T LEXUS — 채용관리</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p50:#EEEDFE;--p100:#CECBF6;--p600:#534AB7;--p700:#4540A0;--p800:#3C3489;
  --t50:#E1F5EE;--t600:#0F6E56;--t800:#085041;
  --r50:#FCEBEB;--r600:#A32D2D;
  --g50:#EAF3DE;--g600:#3B6D11;--g800:#27500A;
  --a50:#FAEEDA;--a600:#854F0B;
  --b50:#E6F1FB;--b600:#185FA5;--b800:#0C447C;
  --gray50:#F7F6F2;--gray100:#EDEDEA;--gray200:#D6D4CE;--gray400:#9E9C97;--gray600:#5F5E5A;--gray900:#1A1918;
  --bg:#F4F3EF;--surface:#fff;--surface2:#F7F6F2;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1A1918;--text2:#5F5E5A;--text3:#A09E98;
  --accent:#534AB7;--accent-hover:#3C3489;--accent-bg:#EEEDFE;
  --radius:12px;--rsm:8px;--rxs:6px;
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}
.hidden{display:none!important}
/* 로그인 */
.login-wrap{max-width:400px;margin:80px auto;padding:0 20px}
.login-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:36px}
.login-logo{margin-bottom:24px}
.login-logo img{height:28px;object-fit:contain}
.login-title{font-size:20px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:24px}
.field{margin-bottom:14px}
.field label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:5px}
.field input,.field select,.field textarea{font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--rxs);padding:10px 12px;outline:none;width:100%;transition:all .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(83,74,183,.08)}
.field input::placeholder,.field textarea::placeholder{color:var(--text3)}
.err{font-size:12px;color:var(--r600);margin-top:6px}
/* 레이아웃 */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sb-logo{padding:16px 20px;border-bottom:0.5px solid var(--border)}
.sb-logo img{height:20px;object-fit:contain}
.sb-nav{flex:1;padding:12px 0;overflow-y:auto}
.sb-label{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:8px 20px 4px}
.sb-link{display:flex;align-items:center;gap:10px;padding:8px 20px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .12s;border:none;background:none;width:100%;font-family:'Pretendard',sans-serif;text-align:left}
.sb-link:hover{background:var(--surface2)}
.sb-link.active{background:var(--accent-bg);color:var(--p800);font-weight:500}
.sb-badge{margin-left:auto;font-size:10px;background:var(--surface2);color:var(--text3);padding:1px 7px;border-radius:20px}
.sb-link.active .sb-badge{background:var(--accent);color:#fff}
.sb-footer{padding:14px 20px;border-top:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;background:var(--accent);color:#fff}
.role-badge{font-size:10px;padding:2px 8px;border-radius:20px;margin-top:2px;display:inline-block}
.role-super{background:#FAEEDA;color:#633806}
.role-manager{background:var(--p50);color:var(--p800)}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
/* 탑바 */
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5}
.topbar-title{font-size:14px;font-weight:500;flex:1}
/* 버튼 */
.btn{font-family:'Pretendard',sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--rxs);border:0.5px solid var(--border2);cursor:pointer;background:var(--surface);color:var(--text2);transition:all .12s}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{color:var(--r600);border-color:rgba(163,45,45,.3)}
.btn-danger:hover{background:var(--r50)}
.btn-success{background:var(--g50);color:var(--g800);border-color:rgba(59,109,17,.2)}
/* 콘텐츠 */
.content{padding:24px 28px;flex:1}
/* 통계 */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px}
.stat-val{font-size:28px;font-weight:300;color:var(--text);margin-bottom:2px}
.stat-label{font-size:12px;color:var(--text3)}
/* 필터 */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.filter-select{font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text2);background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--rxs);padding:7px 12px;outline:none;cursor:pointer}
.search-input{font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--rxs);padding:7px 12px;outline:none;flex:1;min-width:200px}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
/* 테이블 */
.table-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table{width:100%;border-collapse:collapse}
.table th{font-size:11px;font-weight:500;color:var(--text3);text-align:left;padding:10px 16px;border-bottom:0.5px solid var(--border);background:var(--surface2);text-transform:uppercase;letter-spacing:.05em}
.table td{padding:12px 16px;border-bottom:0.5px solid var(--border);font-size:13px;vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tr.clickable:hover td{background:var(--surface2);cursor:pointer}
.c-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.stage-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.source-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--text2)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
/* 모달 (오른쪽 슬라이드) */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-start;justify-content:flex-end}
.modal{width:700px;height:100vh;background:var(--surface);overflow-y:auto;animation:slideIn .2s ease;display:flex;flex-direction:column}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:none}}
.modal-header{padding:18px 24px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-close{margin-left:auto;font-size:18px;cursor:pointer;color:var(--text3);background:none;border:none;padding:4px 8px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px;flex:1}
/* 프로필 */
.profile-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px;padding:18px;background:var(--surface2);border-radius:var(--rsm)}
.profile-avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500;flex-shrink:0}
.profile-name{font-size:18px;font-weight:600;margin-bottom:2px}
/* 섹션 */
.section{margin-bottom:24px}
.section-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-item{background:var(--surface2);border-radius:var(--rxs);padding:10px 12px}
.info-item .label{font-size:11px;color:var(--text3);margin-bottom:2px}
.info-item .val{font-size:13px;font-weight:500;color:var(--text)}
.full-width{grid-column:1/-1}
.exp-card{border:0.5px solid var(--border);border-radius:var(--rsm);padding:14px;margin-bottom:10px}
.exp-title{font-size:13px;font-weight:600}
.exp-sub{font-size:12px;color:var(--text2);margin-top:1px}
.exp-period{font-size:11px;color:var(--text3);margin-top:3px}
.exp-desc{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.65}
.essay-card{border:0.5px solid var(--border);border-radius:var(--rsm);padding:16px;margin-bottom:12px}
.essay-q{font-size:12px;font-weight:600;color:var(--p800);margin-bottom:8px}
.essay-a{font-size:13px;color:var(--text2);line-height:1.7}
.stage-select-wrap{display:flex;gap:8px;align-items:center}
.stage-select{font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--rxs);padding:8px 12px;outline:none;flex:1}
.note-card{background:var(--surface2);border-radius:var(--rsm);padding:12px;margin-bottom:10px}
.note-author{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px}
.note-text{font-size:13px;color:var(--text2);line-height:1.65}
.note-date{font-size:11px;color:var(--text3);margin-top:4px}
.note-compose textarea{font-family:'Pretendard',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--rxs);padding:10px 12px;outline:none;width:100%;resize:none;line-height:1.6;margin-bottom:8px}
.note-compose textarea:focus{border-color:var(--accent);background:var(--surface)}
.tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:20px}
.tab{padding:9px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .12s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.tab-content{display:none}
.tab-content.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.skill-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface2);color:var(--text2);border:0.5px solid var(--border);margin:2px}
/* 공고 관리 카드 */
.job-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;display:flex;align-items:flex-start;gap:14px}
.job-card-info{flex:1}
.job-card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.job-card-meta{font-size:12px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap}
.job-card-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
/* 관리자 관리 */
.admin-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.admin-info{flex:1}
.admin-name{font-size:13px;font-weight:500}
.admin-email{font-size:12px;color:var(--text3)}
.admin-perms{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.perm-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--p50);color:var(--p800)}
/* 폼 모달 */
.form-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
.form-modal-inner{background:var(--surface);border-radius:var(--radius);padding:28px;width:500px;max-height:85vh;overflow-y:auto}
.form-modal-title{font-size:16px;font-weight:600;margin-bottom:20px}
/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--gray900);color:#fff;font-size:13px;padding:10px 20px;border-radius:var(--rsm);opacity:0;transition:all .2s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* 로딩 */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--p100);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gray200);border-radius:2px}
.divider{height:0.5px;background:var(--border);margin:16px 0}
</style>
</head>

          <div id="mBadges" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">접수번호</div>
          <div style="font-size:12px;font-weight:500" id="mSubNum"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">파이프라인 단계</div>
        <div class="stage-select-wrap">
          <select class="stage-select" id="mStageSelect">
            <option>지원완료</option><option>서류검토</option><option>서류합격</option>
            <option>1차면접</option><option>2차면접</option><option>최종면접</option>
            <option>평가중</option><option>최종합격</option><option>불합격</option><option>보류</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="updateStage()">저장</button>
          <button class="btn btn-danger btn-sm" onclick="rejectApp()">불합격</button>

      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('Info')">기본정보</div>
        <div class="tab" onclick="switchTab('Career')">학력·경력</div>
        <div class="tab" onclick="switchTab('Extra')">자격·어학</div>
        <div class="tab" onclick="switchTab('Essay')">자기소개서</div>
        <div class="tab" onclick="switchTab('Notes')">메모</div>
      </div>

        <div class="section"><div class="section-title">인적사항</div><div class="info-grid" id="mBasicInfo"></div></div>
        <div class="section"><div class="section-title">지원 정보</div><div class="info-grid" id="mApplyInfo"></div></div>
        <div class="section"><div class="section-title">보유 스킬</div><div id="mSkills"></div></div>
        <div class="section"><div class="section-title">링크</div><div class="info-grid" id="mLinks"></div></div>
      </div>
      <div id="tabCareer" class="tab-content">
        <div class="section"><div class="section-title">학력</div><div id="mEdu"></div></div>
        <div class="section"><div class="section-title">경력</div><div id="mWork"></div></div>
      </div>
      <div id="tabExtra" class="tab-content">
        <div class="section"><div class="section-title">자격증</div><div id="mCerts"></div></div>
        <div class="section"><div class="section-title">수상·활동</div><div id="mAwards"></div></div>

<!-- 공고 등록/수정 폼 모달 -->
<div id="jobFormModal" class="form-modal hidden">
  <div class="form-modal-inner">
    <div class="form-modal-title" id="jobFormTitle">채용 공고 등록</div>
    <div class="field"><label>공고 제목 <span style="color:var(--accent)">*</span></label><input type="text" id="jTitle" placeholder="예: 시니어 프론트엔드 엔지니어"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field"><label>부서</label><input type="text" id="jDept" placeholder="개발팀"></div>
      <div class="field"><label>근무지</label><input type="text" id="jLocation" placeholder="서울 강남구"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field"><label>고용 형태</label>
        <select id="jType"><option>정규직</option><option>계약직</option><option>인턴십</option><option>파트타임</option></select>
      </div>

      <button class="btn" onclick="closeJobForm()">취소</button>
      <button class="btn btn-primary" onclick="saveJob()">저장</button>
    </div>
  </div>
</div>

let allApps = [];
let allJobs = [];
let allAdmins = [];

let editJobId = null;
let permTargetAdminId = null;

  '2차면접':{bg:'#EEEDFE',color:'#4540A0'},'최종면접':{bg:'#FAEEDA',color:'#633806'},
  '평가중':{bg:'#FAEEDA',color:'#854F0B'},'최종합격':{bg:'#EAF3DE',color:'#27500A'},

// ── 초기화 ───────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) { currentAdmin = session.user; await loadAdminProfile(); showApp(); }
});

async function loadAdminProfile() {
  const { data } = await sb.from('admin_profiles').select('*').eq('id', currentAdmin.id).maybeSingle();
  adminProfile = data;
}

// ── 로그인 ───────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const pw = document.getElementById('adminPw').value;
  const err = document.getElementById('loginErr');
  err.classList.add('hidden');
  if (!email || !pw) { err.textContent = '이메일과 비밀번호를 입력하세요'; err.classList.remove('hidden'); return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { err.textContent = '이메일 또는 비밀번호가 올바르지 않습니다'; err.classList.remove('hidden'); return; }
  currentAdmin = data.user;
  await loadAdminProfile();
  showApp();
}

async function doLogout() { await sb.auth.signOut(); location.reload(); }

// ── 앱 진입 ──────────────────────────────────────────
async function showApp() {
  document.getElementById('viewLogin').classList.add('hidden');
  document.getElementById('viewApp').classList.remove('hidden');
  const isSuperAdmin = adminProfile?.role === 'superadmin';
  const name = adminProfile?.name || currentAdmin.email.split('@')[0];
  document.getElementById('adminName').textContent = name;
  document.getElementById('adminAvatar').textContent = name[0].toUpperCase();
  const rb = document.getElementById('roleBadge');
  rb.textContent = isSuperAdmin ? '슈퍼어드민' : '관리자';
  rb.className = 'role-badge ' + (isSuperAdmin ? 'role-super' : 'role-manager');
  if (isSuperAdmin) {
    document.getElementById('superAdminMenu').classList.remove('hidden');
    document.getElementById('btnAddJob').classList.remove('hidden');
  }
  await loadJobs();
  await loadApplications();
}

// ── 채용 공고 ────────────────────────────────────────
async function loadJobs() {
  let query = sb.from('job_postings').select('*').order('created_at', { ascending: false });
  // 일반 관리자: 권한 있는 공고만
  if (adminProfile?.role !== 'superadmin') {
    const { data: perms } = await sb.from('admin_job_permissions').select('job_posting_id').eq('admin_id', currentAdmin.id);
    const ids = (perms || []).map(p => p.job_posting_id);
    if (!ids.length) { allJobs = []; renderJobs(); return; }
    query = query.in('id', ids);
  }
  const { data } = await query;
  allJobs = data || [];
  document.getElementById('sbJobs').textContent = allJobs.length;
  document.getElementById('jobCountInfo').textContent = `${allJobs.filter(j=>j.is_active).length} / 15개 활성`;
  // 필터 셀렉트 업데이트
  const sel = document.getElementById('jobFilter');
  sel.innerHTML = '<option value="">전체 공고</option>';
  allJobs.forEach(j => { const o = document.createElement('option'); o.value = j.id; o.textContent = j.title; sel.appendChild(o); });
  renderJobs();
}

function renderJobs() {
  const c = document.getElementById('jobsContent');
  if (!allJobs.length) { c.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>등록된 공고가 없습니다</p></div>'; return; }
  c.innerHTML = allJobs.map(j => `
    <div class="job-card">
      <div style="width:8px;height:8px;border-radius:50%;background:${j.is_active?'#3B6D11':'#9E9C97'};margin-top:6px;flex-shrink:0"></div>
      <div class="job-card-info">
        <div class="job-card-title">${j.title}</div>
        <div class="job-card-meta">

function openJobForm(jobId = null) {
  editJobId = jobId;
  document.getElementById('jobFormTitle').textContent = jobId ? '채용 공고 수정' : '채용 공고 등록';
  if (jobId) {
    const j = allJobs.find(x => x.id === jobId);
    if (j) {
      document.getElementById('jTitle').value = j.title || '';
      document.getElementById('jDept').value = j.department || '';
      document.getElementById('jLocation').value = j.location || '';
      document.getElementById('jType').value = j.employment_type || '정규직';
      document.getElementById('jActive').value = String(j.is_active);
      document.getElementById('jDesc').value = j.description || '';
      document.getElementById('jReq').value = j.requirements || '';
    }
  } else {
    ['jTitle','jDept','jLocation','jDesc','jReq'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('jType').value = '정규직';
    document.getElementById('jActive').value = 'true';
  }
  document.getElementById('jobFormModal').classList.remove('hidden');
}

function closeJobForm() { document.getElementById('jobFormModal').classList.add('hidden'); editJobId = null; }

async function saveJob() {
  const title = document.getElementById('jTitle').value.trim();
  if (!title) { showToast('공고 제목을 입력하세요'); return; }
  const payload = {
    title, department: document.getElementById('jDept').value,
    location: document.getElementById('jLocation').value,
    employment_type: document.getElementById('jType').value,
    is_active: document.getElementById('jActive').value === 'true',
    description: document.getElementById('jDesc').value,
    requirements: document.getElementById('jReq').value,
    updated_at: new Date().toISOString()
  };
  let error;
  if (editJobId) {
    ({ error } = await sb.from('job_postings').update(payload).eq('id', editJobId));
  } else {
    ({ error } = await sb.from('job_postings').insert(payload));
  }
  if (error) { showToast('오류: ' + error.message); return; }
  closeJobForm();
  await loadJobs();
  showToast(editJobId ? '✓ 공고 수정 완료' : '✓ 공고 등록 완료');
}

async function deleteJob(id, title) {
  if (!confirm(`"${title}" 공고를 삭제하시겠습니까?\n삭제하면 복구할 수 없습니다.`)) return;
  const { error } = await sb.from('job_postings').delete().eq('id', id);
  if (error) { showToast('삭제 실패: ' + error.message); return; }
  await loadJobs();
  showToast('✓ 공고가 삭제되었습니다');
}

async function toggleJobActive(id, current) {
  await sb.from('job_postings').update({ is_active: !current }).eq('id', id);
  await loadJobs();
  showToast(current ? '공고 마감 처리' : '공고 재개');
}

// ── 지원자 목록 ──────────────────────────────────────
async function loadApplications() {
  document.getElementById('appTableBody').innerHTML = '<tr><td colspan="6"><div class="loading"><div class="spinner"></div>불러오는 중...</div></td></tr>';
  let query = sb.from('applications').select('*, job_postings(title)').eq('is_draft', false).order('submitted_at', { ascending: false });
  // 일반 관리자: 권한 공고만
  if (adminProfile?.role !== 'superadmin' && allJobs.length) {
    const ids = allJobs.map(j => j.id);
    query = query.in('job_posting_id', ids);
  } else if (adminProfile?.role !== 'superadmin' && !allJobs.length) {
    allApps = []; renderTable([]); updateStats(); return;
  }
  const { data, error } = await query;
  if (error) { document.getElementById('appTableBody').innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>오류: ${error.message}</p></div></td></tr>`; return; }
  allApps = data || [];
  updateStats();
  renderTable(allApps);
}

function updateStats() {
  document.getElementById('sbTotal').textContent = allApps.length;
  document.getElementById('st1').textContent = allApps.length;
  const wa = new Date(Date.now()-7*24*60*60*1000).toISOString();
  document.getElementById('st2').textContent = allApps.filter(a=>a.submitted_at>wa).length;
  document.getElementById('st3').textContent = allApps.filter(a=>['1차면접','2차면접','최종면접'].includes(a.stage)).length;
  document.getElementById('st4').textContent = allApps.filter(a=>a.stage==='최종합격').length;
}

function renderTable(apps) {
  const tbody = document.getElementById('appTableBody');
  if (!apps.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="icon">👥</div><p>지원자가 없습니다</p></div></td></tr>'; return; }
  tbody.innerHTML = apps.map((a,i) => {
    const ac = AV_COLORS[i%AV_COLORS.length];
    const sc = STAGE_COLORS[a.stage]||STAGE_COLORS['지원완료'];
    const date = a.submitted_at ? new Date(a.submitted_at).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) : '-';
    return `<tr class="clickable" onclick="openModal('${a.id}')">
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="c-avatar" style="background:${ac.bg};color:${ac.color}">${(a.name||'?').slice(0,2)}</div>
        <div><div style="font-weight:500">${a.name||'이름없음'}</div><div style="font-size:11px;color:var(--text3)">${a.email||''}</div></div>
      </div></td>
      <td style="font-size:13px;color:var(--text2)">${a.job_postings?.title||'-'}</td>
      <td><span class="stage-badge" style="background:${sc.bg};color:${sc.color}">${a.stage||'지원완료'}</span></td>
      <td><span class="source-tag">${(a.apply_source||[]).join(', ')||'-'}</span></td>

      <td onclick="event.stopPropagation()">
        <select class="filter-select" style="font-size:12px;padding:4px 8px" onchange="quickStage('${a.id}',this.value)">
          ${['지원완료','서류검토','서류합격','1차면접','2차면접','최종면접','평가중','최종합격','불합격','보류'].map(s=>`<option ${a.stage===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
    </tr>`;
  }).join('');
}

function filterApps() {
  const q = document.getElementById('searchInput').value.toLowerCase();

  const job = document.getElementById('jobFilter').value;
  renderTable(allApps.filter(a =>

  // 서브 테이블 데이터 로드

    sb.from('education').select('*').eq('application_id', currentAppId).order('sort_order'),

    sb.from('certifications').select('*').eq('application_id', currentAppId),
    sb.from('language_skills').select('*').eq('application_id', currentAppId),
  ]);

  const resumeData = {
    jobTitle: app.job_postings?.title || '',
    basic: {
      name: app.name, nameEn: app.name_en, birth: app.birth_date,
      gender: app.gender, nation: app.nationality, email: app.email,

      source: app.apply_source || [], skills: app.skills || []
    },
    education: edus || [],

    certifications: certs || [],
    language_skills: langs || [],
    essay: {

      q3: app.essay_strength, q4: app.essay_goal
    }
  };

  // API 호출로 docx 생성
  generateDocx(resumeData, app.name || 'resume');

function generateDocx(data, filename) {
  // docx 생성을 위한 Blob 기반 방식 (브라우저에서 직접 생성)
  // JSON 데이터를 서버로 보내거나 브라우저에서 직접 생성
  const jsonStr = JSON.stringify(data, null, 2);
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename}_입사지원서.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ 지원서 데이터 다운로드 완료 (JSON)');
}

  if(pw.length<8){err.textContent='비밀번호는 8자 이상이어야 합니다';err.classList.remove('hidden');return;}
  // Supabase Auth 계정 생성
  const {data,error}=await sb.auth.admin ? sb.auth.admin.createUser({email,password:pw,email_confirm:true}) : await sb.auth.signUp({email,password:pw});
  // admin_profiles 에 직접 upsert (signUp으로 생성)
  showToast('관리자 계정을 생성 중...');
  // signUp 방식으로 생성 후 profile 등록
  const {data:signData,error:signErr}=await sb.auth.signUp({email,password:pw,options:{data:{name}}});
  if(signErr&&signErr.message!=='User already registered'){err.textContent='오류: '+signErr.message;err.classList.remove('hidden');return;}
  const uid=signData?.user?.id;
  if(uid){
    await sb.from('admin_profiles').upsert({id:uid,email,name,role,department:dept||null,is_active:true});
    // 권한 부여
    const checked=Array.from(document.querySelectorAll('#aJobPerms input:checked')).map(c=>c.value);
    if(role==='manager'&&checked.length){
      await sb.from('admin_job_permissions').insert(checked.map(jid=>({admin_id:uid,job_posting_id:jid,granted_by:currentAdmin.id})));
    }
  }
  closeAdminForm();
  await loadAdmins();
  showToast('✓ 관리자 추가 완료. 이메일 인증 후 로그인 가능합니다.');
}

async function deactivateAdmin(id,name){
  if(!confirm(`${name} 관리자를 비활성화하시겠습니까?`))return;
  await sb.from('admin_profiles').update({is_active:false}).eq('id',id);
  await loadAdmins();showToast('비활성화 완료');
}

// ── 권한 설정 ────────────────────────────────────────
async function openPermForm(adminId,adminName){
  permTargetAdminId=adminId;
  document.getElementById('permAdminName').textContent=adminName+' 관리자의 접근 가능 공고를 선택하세요';
  const {data:current}=await sb.from('admin_job_permissions').select('job_posting_id').eq('admin_id',adminId);
  const currentIds=(current||[]).map(p=>p.job_posting_id);
  document.getElementById('permJobList').innerHTML=allJobs.map(j=>`
    <label style="display:flex;align-items:center;gap:10px;padding:10px;border:0.5px solid var(--border);border-radius:var(--rxs);cursor:pointer;font-size:13px">
      <input type="checkbox" value="${j.id}" ${currentIds.includes(j.id)?'checked':''}>
      <div>
        <div style="font-weight:500">${j.title}</div>
        <div style="font-size:11px;color:var(--text3)">${j.department||''} ${j.is_active?'· 모집중':'· 마감'}</div>
      </div>
    </label>
  `).join('');
  document.getElementById('permFormModal').classList.remove('hidden');
}
function closePermForm(){document.getElementById('permFormModal').classList.add('hidden');permTargetAdminId=null;}

async function savePerms(){
  const checked=Array.from(document.querySelectorAll('#permJobList input:checked')).map(c=>c.value);
  await sb.from('admin_job_permissions').delete().eq('admin_id',permTargetAdminId);
  if(checked.length){
    await sb.from('admin_job_permissions').insert(checked.map(jid=>({admin_id:permTargetAdminId,job_posting_id:jid,granted_by:currentAdmin.id})));
  }
  closePermForm();
  await loadAdmins();
  showToast('✓ 권한 설정 완료');
}

// ── 페이지 전환 ──────────────────────────────────────
function showPage(name,el){
  document.querySelectorAll('.sb-link').forEach(l=>l.classList.remove('active'));
  el.classList.add('active');
  ['Pipeline','Jobs','Admins'].forEach(p=>document.getElementById('page'+p).classList.toggle('hidden',p.toLowerCase()!==name));
  if(name==='admins')loadAdmins();
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`)?.classList.add('active');
  document.getElementById('tab'+name)?.classList.add('active');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
